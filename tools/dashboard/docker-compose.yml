version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-trading-dashboard
    ports:
      - "8050:8050"
    environment:
      - FLASK_ENV=production
      - DASHBOARD_REFRESH_SECS=60
    volumes:
      - ../tools:/app/tools:ro
      - ../state:/app/state:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/"]
      interval: 30s
      timeout: 10s
      retries: 3
